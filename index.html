<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alto Ahí - Exceso de Preciosura</title>
    <style>
        /* Fondo color crema exacto de la imagen */
        body {
            margin: 0;
            background-color: #fceade;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Fuentes redondeadas similares a las del cartel */
            font-family: 'Arial Rounded MT Bold', 'Ubuntu', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Contenedor del Texto con la animación flotante */
        .text-container {
            position: relative;
            text-align: center;
            z-index: 10;
            animation: floatAnimation 4s ease-in-out infinite;
        }

        /* Líneas decorativas naranjas al lado de "alto ahí" */
        .decorations {
            color: #f07b65;
            font-size: 30px;
            display: inline-block;
            margin: 0 10px;
            letter-spacing: -2px;
        }

        /* Estilo para: alto ahí / vienes con */
        .text-dark {
            color: #4a2810;
            font-size: 48px;
            font-weight: 800;
            line-height: 1.1;
            margin: 0;
        }

        /* Estilo para: exceso de / preciosura */
        .text-pink {
            color: #f07b65;
            font-size: 58px;
            font-weight: 800;
            line-height: 1.1;
            margin: 5px 0 0 0;
            display: block;
        }

        /* Animación suave para que el texto flote en la pantalla */
        @keyframes floatAnimation {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px); /* Sube sutilmente */
            }
            100% {
                transform: translateY(0px);
            }
        }

        /* Lienzo transparente para los corazones giratorios */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="text-container">
        <p class="text-dark">
            <span class="decorations">\\\</span>alto ahí<span class="decorations">///</span><br>
            vienes con
        </p>
        <span class="text-pink">
            exceso de<br>
            preciosura
        </span>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const hearts = [];
        const totalHearts = 25; // Cantidad de corazones pequeños flotando

        class SpinningHeart {
            constructor() {
                this.reset();
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
            }

            reset() {
                this.size = Math.random() * 10 + 8;
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + this.size + Math.random() * 100;
                this.speedY = -(Math.random() * 0.7 + 0.4);
                this.angle = Math.random() * Math.PI * 2;
                this.spinSpeed = (Math.random() - 0.5) * 0.03; // Velocidad de rotación
                this.wobble = Math.random() * Math.PI;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                // Color idéntico al rosa de las letras
                this.color = `rgba(240, 123, 101, ${Math.random() * 0.4 + 0.6})`;
            }

            update() {
                this.y += this.speedY;
                this.angle += this.spinSpeed; // Hace que giren sobre su propio eje
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.3; // Movimiento ondulado

                if (this.y < -this.size) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.beginPath();
                ctx.fillStyle = this.color;
                
                // Curva matemática del corazoncito
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, -this.size / 3, -this.size, 0);
                ctx.bezierCurveTo(-this.size, this.size / 2, -this.size / 3, this.size, 0, this.size * 1.3);
                ctx.bezierCurveTo(this.size / 3, this.size, this.size, this.size / 2, this.size, 0);
                ctx.bezierCurveTo(this.size, -this.size / 3, this.size / 2, -this.size / 2, 0, 0);
                
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < totalHearts; i++) {
            hearts.push(new SpinningHeart());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
