<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* Fondo crema romántico e infinito */
        body {
            margin: 0;
            background-color: #fceade;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Fredoka', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Contenedor de la Experiencia */
        .romantic-wrapper {
            position: relative;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 420px;
        }

        /* Recuadro de los poemas iniciales */
        .poem-card {
            background-color: rgba(255, 255, 255, 0.94);
            padding: 40px 35px;
            border-radius: 32px;
            box-shadow: 0 15px 35px rgba(240, 123, 101, 0.12);
            border: 2px solid rgba(240, 123, 101, 0.15);
            width: 100%;
            box-sizing: border-box;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: cardFloat 4.5s ease-in-out infinite;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .poem-card.fade {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
        }

        /* Ocultar elementos de forma limpia */
        .hidden {
            display: none !important;
        }

        .decorations {
            color: #f07b65;
            font-size: 28px;
            display: inline-block;
            margin: 0 8px;
            vertical-align: middle;
        }

        .text-dark {
            color: #4a2810;
            font-size: 38px;
            font-weight: 700;
            line-height: 1.25;
            margin: 0;
        }

        .text-pink {
            color: #f07b65;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.2;
            margin: 10px 0 0 0;
            display: block;
        }

        /* Botón solo con flecha limpia */
        .arrow-btn {
            margin-top: 25px;
            background-color: #f07b65;
            color: #ffffff;
            border: none;
            width: 60px;
            height: 60px;
            font-size: 26px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(240, 123, 101, 0.3);
            transition: all 0.2s ease;
            outline: none;
            padding: 0;
        }

        .arrow-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 24px rgba(240, 123, 101, 0.4);
            background-color: #f28b77;
        }

        /* Contenedor limpio para la flor final */
        #roseContainer {
            opacity: 0;
            transform: scale(0.85);
            transition: opacity 1.2s ease, transform 1.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 15;
        }

        #roseContainer.show {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Lienzos generales */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #heartCanvas { z-index: 5; }
        
        /* Tamaño óptimo para apreciar la flor de loto en el centro */
        #roseCanvas { 
            position: relative; 
            width: 450px; 
            height: 450px; 
            z-index: 12; 
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="romantic-wrapper">
        <div class="poem-card" id="poemCard">
            <p class="text-dark">
                <span class="decorations">✨</span>¡Alto ahí!<span class="decorations">✨</span><br>
                Vienes con
            </p>
            <span class="text-pink">
                exceso de<br>
                preciosura.
            </span>
        </div>

        <button class="arrow-btn" id="nextBtn" onclick="changePoem()">➔</button>

        <div id="roseContainer" class="hidden">
            <canvas id="roseCanvas"></canvas>
        </div>
    </div>

    <script>
        // --- POEMAS CON ORTOGRAFÍA IMPECABLE ---
        const poems = [
            {
                dark: "<span class='decorations'>✨</span>¡Alto ahí!<span class='decorations'>✨</span><br>Vienes con",
                pink: "exceso de<br>preciosura."
            },
            {
                dark: "En un mar de<br>estrellas,",
                pink: "mis ojos siempre<br>te buscan a ti."
            },
            {
                dark: "No es lo que<br>siento por ti,",
                pink: "es lo que no siento<br>por nadie más."
            },
            {
                dark: "Mi lugar favorito<br>en el mundo",
                pink: "es siempre a<br>tu lado."
            }
        ];

        let currentIndex = 0;
        const poemCard = document.getElementById('poemCard');
        const nextBtn = document.getElementById('nextBtn');
        const roseContainer = document.getElementById('roseContainer');

        function changePoem() {
            poemCard.classList.add('fade');

            setTimeout(() => {
                if (currentIndex === poems.length - 1) {
                    poemCard.classList.add('hidden');
                    nextBtn.classList.add('hidden');
                    
                    roseContainer.classList.remove('hidden');
                    setTimeout(() => {
                        roseContainer.classList.add('show');
                        initLotusFlower(); // Inicializa el renderizado limpio de la flor
                    }, 50);
                    return;
                }

                currentIndex++;
                poemCard.innerHTML = `
                    <p class="text-dark">${poems[currentIndex].dark}</p>
                    <span class="text-pink">${poems[currentIndex].pink}</span>
                `;
                poemCard.classList.remove('fade');
            }, 300);
        }


        // --- SISTEMA DE CORAZONES FLOTANTES, GIRATORIOS Y ESCARCHADOS ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const hearts = [];
        class SparklingHeart {
            constructor() {
                this.reset();
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
            }
            reset() {
                this.size = Math.random() * 10 + 8;
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + this.size + Math.random() * 100;
                this.speedY = -(Math.random() * 0.5 + 0.35);
                this.angle = Math.random() * Math.PI * 2;
                this.spinSpeed = (Math.random() * 0.02 + 0.01) * (Math.random() < 0.5 ? 1 : -1);
                this.wobble = Math.random() * Math.PI;
                this.wobbleSpeed = Math.random() * 0.015 + 0.01;
                this.alpha = Math.random() * 0.35 + 0.6;
                this.sparkleSize = Math.random() * 10 + 10;
            }
            update() {
                this.y += this.speedY;
                this.angle += this.spinSpeed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.25;
                if (this.y < -this.size) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.shadowBlur = this.sparkleSize;
                ctx.shadowColor = `rgba(255, 190, 180, ${this.alpha})`;
                ctx.beginPath();
                let gradient = ctx.createRadialGradient(0, 0, 1, 0, 0, this.size);
                gradient.addColorStop(0, `rgba(255, 210, 200, ${this.alpha})`);
                gradient.addColorStop(0.8, `rgba(240, 123, 101, ${this.alpha})`);
                ctx.fillStyle = gradient;
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, -this.size / 3, -this.size, 0);
                ctx.bezierCurveTo(-this.size, this.size / 2, -this.size / 3, this.size, 0, this.size * 1.35);
                ctx.bezierCurveTo(this.size / 3, this.size, this.size, this.size / 2, this.size, 0);
                ctx.bezierCurveTo(this.size, -this.size / 3, this.size / 2, -this.size / 2, 0, 0);
                ctx.fill();
                ctx.restore();
            }
        }
        for (let i = 0; i < 35; i++) hearts.push(new SparklingHeart());


        // --- GEOMETRÍA TRIDIMENSIONAL LIMPIA Y REDEFINIDA DE LA FLOR DE LOTO ---
        const roseCanvas = document.getElementById('roseCanvas');
        const rCtx = roseCanvas.getContext('2d');
        roseCanvas.width = 500;
        roseCanvas.height = 500;

        let globalRotation = 0;

        function initLotusFlower() {
            function drawFrame() {
                rCtx.clearRect(0, 0, roseCanvas.width, roseCanvas.height);
                
                let cx = roseCanvas.width / 2;
                let cy = roseCanvas.height / 2 + 20;
                globalRotation += 0.008; // Giro continuo, sutil y elegante

                // Array para almacenar y ordenar puntos por profundidad (Z-buffering nativo)
                let pointsGroup = [];

                // 1. GENERACIÓN GEOMÉTRICA DE CAPAS DE PÉTALOS (De adentro hacia afuera)
                // Capas: 0 = Centro pistilo, 1-5 = Filas de pétalos abiertos superpuestos
                for (let layer = 0; layer <= 5; layer++) {
                    let totalPetals = layer === 0 ? 1 : 6 + layer * 4; // Más pétalos en capas externas
                    let layerRadius = layer * 28;

                    for (let p = 0; p < totalPetals; p++) {
                        let baseAngle = (p * (360 / totalPetals) * Math.PI) / 180;
                        
                        // Densidad interna de cada pétalo para rellenarlo de color sólido impecable
                        for (let lengthFactor = 0.1; lengthFactor <= 1.0; lengthFactor += 0.08) {
                            let currentRadius = layerRadius * lengthFactor;
                            
                            // Ancho de los pétalos (abiertos y curvos como el loto original)
                            let widthSpread = layer === 0 ? 0 : (1.0 - lengthFactor) * 0.45;
                            
                            for (let angleOffset = -widthSpread; angleOffset <= widthSpread; angleOffset += 0.05) {
                                let theta = baseAngle + angleOffset;
                                
                                // Elevación tridimensional del pétalo (Copa cóncava perfecta)
                                let petalCurve = Math.sin(lengthFactor * Math.PI * 0.5);
                                let x = currentRadius * Math.cos(theta);
                                let y = currentRadius * Math.sin(theta);
                                let z = (layer * 12) - (petalCurve * 35) + (lengthFactor * 15);

                                // Inclinación de cámara realista (Vista superior semi-inclinada)
                                let tilt = 0.75; 
                                let tempY = y * Math.cos(tilt) - z * Math.sin(tilt);
                                let tempZ = y * Math.sin(tilt) + z * Math.cos(tilt);

                                // Rotación global interactiva sobre el eje central
                                let rotX = x * Math.cos(globalRotation) - tempY * Math.sin(globalRotation);
                                let rotY = x * Math.sin(globalRotation) + tempY * Math.cos(globalRotation);

                                // Cálculo de perspectiva de lente
                                let perspective = 450 / (450 + tempZ);
                                let projX = cx + rotX * perspective;
                                let projY = cy + rotY * perspective;

                                // ASIGNACIÓN MATRICIAL DE COLORES (Idéntica a la imagen de referencia)
                                let colorString = "";
                                if (layer === 0) {
                                    // Centro absoluto: Pistilo amarillo vibrante
                                    colorString = `rgba(243, 226, 45, 0.95)`;
                                } else {
                                    // Pétalos degradados: Puntas magenta, base blanca pura
                                    if (lengthFactor > 0.7) {
                                        // Extremo exterior del pétalo: Magenta/Violeta encendido e intenso
                                        let edgeTone = (lengthFactor - 0.7) / 0.3;
                                        colorString = `rgba(${205 + edgeTone * 30}, 20, ${165 + edgeTone * 40}, 0.9)`;
                                    } else if (lengthFactor > 0.35) {
                                        // Transición: Rosa difuminado suave
                                        let midTone = (lengthFactor - 0.35) / 0.35;
                                        colorString = `rgba(245, ${150 - midTone * 100}, ${220 - midTone * 40}, 0.85)`;
                                    } else {
                                        // Base interna del pétalo: Blanco puro/crema sedoso
                                        colorString = `rgba(255, 252, 255, 0.9)`;
                                    }
                                }

                                // Guardamos el punto con su profundidad Z para ordenarlos
                                pointsGroup.push({
                                    x: projX,
                                    y: projY,
                                    z: tempZ,
                                    size: Math.max(0.8, (layer === 0 ? 2.5 : 4.0) * perspective),
                                    color: colorString
                                });
                            }
                        }
                    }
                }

                // 2. ORDENAMIENTO DE PROFUNDIDAD (Pinta de atrás hacia adelante para evitar transparencias rotas)
                pointsGroup.sort((pointA, pointB) => pointB.z - pointA.z);

                // 3. RENDERIZADO NETO EN PANTALLA
                pointsGroup.forEach(point => {
                    rCtx.beginPath();
                    rCtx.fillStyle = point.color;
                    rCtx.arc(point.x, point.y, point.size, 0, Math.PI * 2);
                    rCtx.fill();
                });

                requestAnimationFrame(drawFrame);
            }
            drawFrame();
        }

        // Bucle global de animación de fondo
        function globalAnimate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });
            requestAnimationFrame(globalAnimate);
        }
        globalAnimate();
    </script>
</body>
</html>
