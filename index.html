<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* Fondo crema romántico e infinito */
        body {
            margin: 0;
            background-color: #fceade;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Fredoka', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Contenedor de la Experiencia */
        .romantic-wrapper {
            position: relative;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 420px;
        }

        /* Recuadro de los poemas iniciales */
        .poem-card {
            background-color: rgba(255, 255, 255, 0.94);
            padding: 40px 35px;
            border-radius: 32px;
            box-shadow: 0 15px 35px rgba(240, 123, 101, 0.12);
            border: 2px solid rgba(240, 123, 101, 0.15);
            width: 100%;
            box-sizing: border-box;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: cardFloat 4.5s ease-in-out infinite;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .poem-card.fade {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
        }

        /* Ocultar elementos de forma limpia */
        .hidden {
            display: none !important;
        }

        .decorations {
            color: #f07b65;
            font-size: 28px;
            display: inline-block;
            margin: 0 8px;
            vertical-align: middle;
        }

        .text-dark {
            color: #4a2810;
            font-size: 38px;
            font-weight: 700;
            line-height: 1.25;
            margin: 0;
        }

        .text-pink {
            color: #f07b65;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.2;
            margin: 10px 0 0 0;
            display: block;
        }

        /* Botón solo con flecha limpia */
        .arrow-btn {
            margin-top: 25px;
            background-color: #f07b65;
            color: #ffffff;
            border: none;
            width: 60px;
            height: 60px;
            font-size: 26px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(240, 123, 101, 0.3);
            transition: all 0.2s ease;
            outline: none;
            padding: 0;
        }

        .arrow-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 24px rgba(240, 123, 101, 0.4);
            background-color: #f28b77;
        }

        /* Contenedor limpio exclusivo para la hermosa flor final */
        #roseContainer {
            opacity: 0;
            transform: scale(0.85);
            transition: opacity 1.2s ease, transform 1.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 15;
        }

        #roseContainer.show {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Canvas de fondo y de la flor */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #heartCanvas { z-index: 5; }
        
        /* Contenedor responsivo adaptado para tu hermosa flor */
        #roseCanvas { 
            position: relative; 
            width: 450px; 
            height: 450px; 
            z-index: 12; 
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="romantic-wrapper">
        <div class="poem-card" id="poemCard">
            <p class="text-dark">
                <span class="decorations">✨</span>¡Alto ahí!<span class="decorations">✨</span><br>
                Vienes con
            </p>
            <span class="text-pink">
                exceso de<br>
                preciosura.
            </span>
        </div>

        <button class="arrow-btn" id="nextBtn" onclick="changePoem()">➔</button>

        <div id="roseContainer" class="hidden">
            <canvas id="roseCanvas" width="700" height="700"></canvas>
        </div>
    </div>

    <script>
        // --- POEMAS CON ORTOGRAFÍA IMPECABLE ---
        const poems = [
            {
                dark: "<span class='decorations'>✨</span>¡Alto ahí!<span class='decorations'>✨</span><br>Vienes con",
                pink: "exceso de<br>preciosura."
            },
            {
                dark: "En un mar de<br>estrellas,",
                pink: "mis ojos siempre<br>te buscan a ti."
            },
            {
                dark: "No es lo que<br>siento por ti,",
                pink: "es lo que no siento<br>por nadie más."
            },
            {
                dark: "Mi lugar favorito<br>en el mundo",
                pink: "es siempre a<br>tu lado."
            }
        ];

        let currentIndex = 0;
        const poemCard = document.getElementById('poemCard');
        const nextBtn = document.getElementById('nextBtn');
        const roseContainer = document.getElementById('roseContainer');

        function changePoem() {
            poemCard.classList.add('fade');

            setTimeout(() => {
                if (currentIndex === poems.length - 1) {
                    poemCard.classList.add('hidden');
                    nextBtn.classList.add('hidden');
                    
                    roseContainer.classList.remove('hidden');
                    setTimeout(() => {
                        roseContainer.classList.add('show');
                        startBeautifulLotus(); // Activa la flor adaptada
                    }, 50);
                    return;
                }

                currentIndex++;
                poemCard.innerHTML = `
                    <p class="text-dark">${poems[currentIndex].dark}</p>
                    <span class="text-pink">${poems[currentIndex].pink}</span>
                `;
                poemCard.classList.remove('fade');
            }, 300);
        }


        // --- SISTEMA DE CORAZONES FLOTANTES, GIRATORIOS Y ESCARCHADOS ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const hearts = [];
        class SparklingHeart {
            constructor() {
                this.reset();
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
            }
            reset() {
                this.size = Math.random() * 10 + 8;
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + this.size + Math.random() * 100;
                this.speedY = -(Math.random() * 0.5 + 0.35);
                this.angle = Math.random() * Math.PI * 2;
                this.spinSpeed = (Math.random() * 0.02 + 0.01) * (Math.random() < 0.5 ? 1 : -1);
                this.wobble = Math.random() * Math.PI;
                this.wobbleSpeed = Math.random() * 0.015 + 0.01;
                this.alpha = Math.random() * 0.35 + 0.6;
                this.sparkleSize = Math.random() * 10 + 10;
            }
            update() {
                this.y += this.speedY;
                this.angle += this.spinSpeed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.25;
                if (this.y < -this.size) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.shadowBlur = this.sparkleSize;
                ctx.shadowColor = `rgba(255, 190, 180, ${this.alpha})`;
                ctx.beginPath();
                let gradient = ctx.createRadialGradient(0, 0, 1, 0, 0, this.size);
                gradient.addColorStop(0, `rgba(255, 210, 200, ${this.alpha})`);
                gradient.addColorStop(0.8, `rgba(240, 123, 101, ${this.alpha})`);
                ctx.fillStyle = gradient;
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, -this.size / 3, -this.size, 0);
                ctx.bezierCurveTo(-this.size, this.size / 2, -this.size / 3, this.size, 0, this.size * 1.35);
                ctx.bezierCurveTo(this.size / 3, this.size, this.size, this.size / 2, this.size, 0);
                ctx.bezierCurveTo(this.size, -this.size / 3, this.size / 2, -this.size / 2, 0, 0);
                ctx.fill();
                ctx.restore();
            }
        }
        for (let i = 0; i < 35; i++) hearts.push(new SparklingHeart());


        // --- INTEGRACIÓN ADAPTADA DE TU HERMOSA FLOR DE LOTO VECTORIAL ---
        const roseCanvas = document.getElementById('roseCanvas');
        const rCtx = roseCanvas.getContext('2d');

        let currentRotation = 0;

        // Tu función exacta de pétalos bezier limpios y perfectos
        function drawPetal(angle, scale, color1, color2) {
            rCtx.save();
            rCtx.translate(350, 350); // Centro relativo del lienzo de 700x700
            rCtx.rotate(angle + currentRotation); // Añadimos la rotación interactiva suave
            rCtx.scale(scale, scale);

            const g = rCtx.createLinearGradient(0, -220, 0, 20);
            g.addColorStop(0, color1);
            g.addColorStop(1, color2);

            rCtx.fillStyle = g;
            rCtx.shadowColor = "#ff66ff";
            rCtx.shadowBlur = 15;

            rCtx.beginPath();
            rCtx.moveTo(0, 0);
            rCtx.bezierCurveTo(-50, -40, -90, -180, 0, -260);
            rCtx.bezierCurveTo(90, -180, 50, -40, 0, 0);
            rCtx.fill();
            rCtx.restore();
        }

        // Sistema de renderizado en bucle con tu estructura exacta de capas
        function startBeautifulLotus() {
            function renderFrame() {
                rCtx.clearRect(0, 0, 700, 700);
                
                // Rotación sutil y progresiva para darle vida a la flor
                currentRotation += 0.006;

                // Capa 1: Pétalos Externos
                for (let i = 0; i < 10; i++) {
                    drawPetal(i * Math.PI * 2 / 10, 1.15, "#ffffff", "#ff00ff");
                }

                // Capa 2: Pétalos Medios
                for (let i = 0; i < 10; i++) {
                    drawPetal(i * Math.PI * 2 / 10 + 0.3, 0.9, "#fff8ff", "#ff66ff");
                }

                // Capa 3: Pétalos Internos
                for (let i = 0; i < 8; i++) {
                    drawPetal(i * Math.PI * 2 / 8, 0.65, "#ffffff", "#ff99ff");
                }

                // Centro de la Flor: Pistilo Amarillo Perfecto de tu código
                const centro = rCtx.createRadialGradient(350, 350, 5, 350, 350, 70);
                centro.addColorStop(0, "#ffffaa");
                centro.addColorStop(1, "#d8a800");

                rCtx.save();
                rCtx.shadowBlur = 25;
                rCtx.shadowColor = "#ffff66";

                rCtx.beginPath();
                rCtx.arc(350, 350, 45, 0, Math.PI * 2);
                rCtx.fillStyle = centro;
                rCtx.fill();
                rCtx.restore();

                requestAnimationFrame(renderFrame);
            }
            renderFrame();
        }

        // Bucle global para la animación trasera de corazones
        function globalAnimate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });
            requestAnimationFrame(globalAnimate);
        }
        globalAnimate();
    </script>
</body>
</html>
