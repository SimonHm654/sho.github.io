<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación de Corazón Neón</title>
    <style>
        /* Fondo oscuro idéntico al de la imagen */
        body {
            margin: 0;
            background-color: #0b1115;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
            /* Crea el efecto de brillo neón verde alrededor del corazón */
            filter: drop-shadow(0 0 12px rgba(0, 255, 128, 0.7));
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        // Tamaño del lienzo ajustable
        canvas.width = 600;
        canvas.height = 600;

        const particles = [];

        // Fórmula matemática para calcular la silueta perfecta del corazón
        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * 12, y: -y * 12 }; 
        }

        // Clase para controlar cada partícula de luz
        class Particle {
            constructor(x, y, isTrail = false) {
                this.x = x + canvas.width / 2;
                this.y = y + canvas.height / 2 - 30;
                this.size = Math.random() * 2 + 1;
                
                // Si es polvo de estrellas que sale volando, le damos velocidad aleatoria
                this.vx = isTrail ? (Math.random() - 0.3) * 2.5 : 0;
                this.vy = isTrail ? (Math.random() - 0.7) * 2.5 : 0;
                
                this.alpha = 1; // Opacidad inicial
                // Tonos de verde brillante (escala HSL)
                this.color = `hsla(${135 + Math.random() * 35}, 100%, 60%, `;
                this.isTrail = isTrail;
            }

            update() {
                if (this.isTrail) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha -= 0.012; // Las partículas voladoras se desvanecen rápido
                } else {
                    this.alpha -= 0.006; // La línea principal se desvanece más lento
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.alpha + ')';
                ctx.fill();
                ctx.restore();
            }
        }

        let t = 0;

        function animate() {
            // Este fondo semi-transparente crea el efecto de "estela" o rastro de movimiento
            ctx.fillStyle = 'rgba(11, 17, 21, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibuja el corazón de forma continua
            if (t < Math.PI * 2) {
                for(let i = 0; i < 4; i++) {
                    const point = getHeartPoint(t);
                    
                    // Crea la línea base del corazón
                    particles.push(new Particle(point.x, point.y, false));
                    
                    // Rompe el corazón en partículas en la parte superior (como la imagen)
                    if (t > Math.PI * 1.4 || t < Math.PI * 0.6) {
                        if(Math.random() > 0.3) {
                            particles.push(new Particle(point.x, point.y, true));
                        }
                    }
                    t += 0.01;
                }
            } else {
                t = 0; // Reinicia el ciclo para que nunca se detenga
            }

            // Renderiza y limpia las partículas viejas
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // Iniciar animación
        animate();
    </script>
</body>
</html>
