<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alto Ahí - Exceso de Preciosura</title>
    <style>
        /* Fondo color crema suave idéntico a la imagen */
        body {
            margin: 0;
            background-color: #fceade;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* Contenedor de la tarjeta del perrito */
        .card-container {
            position: relative;
            width: 90%;
            max-width: 450px;
            aspect-ratio: 1 / 1;
            background-color: #fceade;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            z-index: 10;
        }

        /* Imagen del perrito ajustada perfectamente */
        .card-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* El lienzo donde se dibujarán los corazones giratorios */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Permite hacer clic a través del canvas si es necesario */
            z-index: 5;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="card-container">
        <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=600" alt="Perrito Policia">
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        // Ajustar el tamaño del canvas a toda la pantalla
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const hearts = [];
        const totalHearts = 25; // Cantidad de corazones flotando

        // Clase para crear y controlar cada corazón
        class SpinningHeart {
            constructor() {
                this.reset();
                // Aparecen en posiciones aleatorias de la pantalla al inicio
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
            }

            reset() {
                this.size = Math.random() * 12 + 8; // Tamaños pequeños variados
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + this.size + Math.random() * 100; // Aparecen desde abajo
                this.speedY = -(Math.random() * 1 + 0.5); // Velocidad de subida suave
                this.angle = Math.random() * Math.PI * 2; // Ángulo de rotación inicial
                this.spinSpeed = (Math.random() - 0.5) * 0.03; // Velocidad y dirección de giro
                this.wobble = Math.random() * Math.PI; // Movimiento ondulado horizontal
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                // Color rosa/rojo pastel como el de la imagen original
                this.color = `rgba(${240 + Math.random() * 15}, ${130 + Math.random() * 20}, ${140 + Math.random() * 20}, ${Math.random() * 0.3 + 0.6})`;
            }

            update() {
                this.y += this.speedY;
                this.angle += this.spinSpeed; // Hace que el corazón gire sobre su propio eje
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5; // Efecto flotante hacia los lados

                // Si sale de la pantalla por arriba, se reinicia abajo
                if (this.y < -this.size) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle); // Aplicamos el giro continuo

                // Dibujar la forma matemática de un corazón clásico en el canvas
                ctx.beginPath();
                ctx.fillStyle = this.color;
                
                // Dibujo vectorial del corazón a partir de su centro
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, -this.size / 3, -this.size, 0);
                ctx.bezierCurveTo(-this.size, this.size / 2, -this.size / 3, this.size, 0, this.size * 1.3);
                ctx.bezierCurveTo(this.size / 3, this.size, this.size, this.size / 2, this.size, 0);
                ctx.bezierCurveTo(this.size, -this.size / 3, this.size / 2, -this.size / 2, 0, 0);
                
                ctx.fill();
                ctx.restore();
            }
        }

        // Inicializar el arreglo de corazones
        for (let i = 0; i < totalHearts; i++) {
            hearts.push(new SpinningHeart());
        }

        // Bucle de animación infinito
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Actualizar y dibujar cada corazoncito de fondo
            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
