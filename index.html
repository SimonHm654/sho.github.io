<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* Fondo crema romántico */
        body {
            margin: 0;
            background-color: #fceade;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Fredoka', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Contenedor de la Experiencia */
        .romantic-wrapper {
            position: relative;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 420px;
        }

        /* Recuadro de los poemas iniciales */
        .poem-card {
            background-color: rgba(255, 255, 255, 0.94);
            padding: 40px 35px;
            border-radius: 32px;
            box-shadow: 0 15px 35px rgba(240, 123, 101, 0.12);
            border: 2px solid rgba(240, 123, 101, 0.15);
            width: 100%;
            box-sizing: border-box;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: cardFloat 4.5s ease-in-out infinite;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .poem-card.fade {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
        }

        /* Ocultar elementos de forma limpia */
        .hidden {
            display: none !important;
        }

        .decorations {
            color: #f07b65;
            font-size: 28px;
            display: inline-block;
            margin: 0 8px;
            vertical-align: middle;
        }

        .text-dark {
            color: #4a2810;
            font-size: 38px;
            font-weight: 700;
            line-height: 1.25;
            margin: 0;
        }

        .text-pink {
            color: #f07b65;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.2;
            margin: 10px 0 0 0;
            display: block;
        }

        /* Botón solo con flecha limpia */
        .arrow-btn {
            margin-top: 25px;
            background-color: #f07b65;
            color: #ffffff;
            border: none;
            width: 60px;
            height: 60px;
            font-size: 26px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(240, 123, 101, 0.3);
            transition: all 0.2s ease;
            outline: none;
        }

        .arrow-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 24px rgba(240, 123, 101, 0.4);
            background-color: #f28b77;
        }

        /* Contenedor especial para la sorpresa final */
        #roseContainer {
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 1s ease, transform 1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 15;
        }

        #roseContainer.show {
            opacity: 1;
            transform: scale(1);
        }

        /* Texto final romántico arriba de la rosa */
        .final-message {
            color: #4a2810;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: -10px;
            line-height: 1.3;
        }

        .final-message span {
            color: #f07b65;
            display: block;
            font-size: 38px;
            margin-top: 5px;
        }

        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Lienzo general de fondo e interactivos */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #heartCanvas { z-index: 5; }
        #roseCanvas { position: relative; width: 350px; height: 350px; z-index: 10; }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="romantic-wrapper">
        <div class="poem-card" id="poemCard">
            <p class="text-dark">
                <span class="decorations">✨</span>¡Alto ahí!<span class="decorations">✨</span><br>
                Vienes con
            </p>
            <span class="text-pink">
                exceso de<br>
                preciosura.
            </span>
        </div>

        <button class="arrow-btn" id="nextBtn" onclick="changePoem()">➔</button>

        <div id="roseContainer" class="hidden">
            <h2 class="final-message">Te lo dije en código... <span>¡Y aquí está tu rosa! 🌹</span></h2>
            <canvas id="roseCanvas"></canvas>
        </div>
    </div>

    <script>
        // --- POEMAS CON ORTOGRAFÍA IMPECABLE ---
        const poems = [
            {
                dark: "<span class='decorations'>✨</span>¡Alto ahí!<span class='decorations'>✨</span><br>Vienes con",
                pink: "exceso de<br>preciosura."
            },
            {
                dark: "En un mar de<br>estrellas,",
                pink: "mis ojos siempre<br>te buscan a ti."
            },
            {
                dark: "No es lo que<br>siento por ti,",
                pink: "es lo que no siento<br>por nadie más."
            },
            {
                dark: "Mi lugar favorito<br>en el mundo",
                pink: "es siempre a<br>tu lado."
            }
        ];

        let currentIndex = 0;
        const poemCard = document.getElementById('poemCard');
        const nextBtn = document.getElementById('nextBtn');
        const roseContainer = document.getElementById('roseContainer');

        function changePoem() {
            poemCard.classList.add('fade');

            setTimeout(() => {
                // Si ya pasamos todos los poemas, disparamos el final de la rosa
                if (currentIndex === poems.length - 1) {
                    poemCard.classList.add('hidden');
                    nextBtn.classList.add('hidden');
                    
                    roseContainer.classList.remove('hidden');
                    setTimeout(() => {
                        roseContainer.classList.add('show');
                        initRose(); // Empieza a renderizar la rosa matemática
                    }, 50);
                    return;
                }

                currentIndex++;
                
                poemCard.innerHTML = `
                    <p class="text-dark">${poems[currentIndex].dark}</p>
                    <span class="text-pink">${poems[currentIndex].pink}</span>
                `;
                
                poemCard.classList.remove('fade');
            }, 300);
        }


        // --- SISTEMA DE CORAZONES FLOTANTES, GIRATORIOS Y ESCARCHADOS ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const hearts = [];
        class SparklingHeart {
            constructor() {
                this.reset();
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
            }
            reset() {
                this.size = Math.random() * 10 + 8;
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + this.size + Math.random() * 100;
                this.speedY = -(Math.random() * 0.5 + 0.35);
                this.angle = Math.random() * Math.PI * 2;
                this.spinSpeed = (Math.random() * 0.02 + 0.01) * (Math.random() < 0.5 ? 1 : -1);
                this.wobble = Math.random() * Math.PI;
                this.wobbleSpeed = Math.random() * 0.015 + 0.01;
                this.alpha = Math.random() * 0.35 + 0.6;
                this.sparkleSize = Math.random() * 10 + 10;
            }
            update() {
                this.y += this.speedY;
                this.angle += this.spinSpeed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.25;
                if (this.y < -this.size) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.shadowBlur = this.sparkleSize;
                ctx.shadowColor = `rgba(255, 190, 180, ${this.alpha})`;
                ctx.beginPath();
                let gradient = ctx.createRadialGradient(0, 0, 1, 0, 0, this.size);
                gradient.addColorStop(0, `rgba(255, 210, 200, ${this.alpha})`);
                gradient.addColorStop(0.8, `rgba(240, 123, 101, ${this.alpha})`);
                ctx.fillStyle = gradient;
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, -this.size / 3, -this.size, 0);
                ctx.bezierCurveTo(-this.size, this.size / 2, -this.size / 3, this.size, 0, this.size * 1.35);
                ctx.bezierCurveTo(this.size / 3, this.size, this.size, this.size / 2, this.size, 0);
                ctx.bezierCurveTo(this.size, -this.size / 3, this.size / 2, -this.size / 2, 0, 0);
                ctx.fill();
                ctx.restore();
            }
        }
        for (let i = 0; i < 35; i++) hearts.push(new SparklingHeart());


        // --- TRADUCCIÓN DEL CÓDIGO MATEMÁTICO DE LA ROSA 3D (DE PYTHON A CANVAS 2D/3D) ---
        // Adapta las funciones paramétricas de la flor tridimensional
        const roseCanvas = document.getElementById('roseCanvas');
        const rCtx = roseCanvas.getContext('2d');
        roseCanvas.width = 350;
        roseCanvas.height = 350;

        let rotationAngle = 0;

        function initRose() {
            function drawRoseFrame() {
                rCtx.clearRect(0, 0, roseCanvas.width, roseCanvas.height);
                
                let cx = roseCanvas.width / 2;
                let cy = roseCanvas.height / 2 + 20;
                rotationAngle += 0.015; // Velocidad de giro automático de la rosa

                // Proyección de puntos basada en la estructura matemática de pétalos de Python
                for (let r = 0; r < 30; r += 0.4) {
                    for (let theta = 0; theta < 360; theta += 4) {
                        let radTheta = (theta * Math.PI) / 180;
                        let radR = r / 15;
                        
                        // Ecuación matemática de la forma de los pétalos de flor
                        let phi = (Math.PI / 2) * Math.exp(-radTheta / (8 * Math.PI));
                        let p = 1.65 * Math.sin(radR * 1.65);
                        let u = 0.5 + Math.abs(Math.sin(p * radTheta)) / 2;
                        
                        // Coordenadas espaciales tridimensionales de la rosa (X, Y, Z)
                        let x = r * Math.sin(phi) * Math.cos(radTheta) * u * 4.5;
                        let y = r * Math.sin(phi) * Math.sin(radTheta) * u * 4.5;
                        let z = r * Math.cos(phi) * 4.5 - 50;

                        // Rotación tridimensional de la rosa en los ejes
                        let rotX = x * Math.cos(rotationAngle) - y * Math.sin(rotationAngle);
                        let rotY = x * Math.sin(rotationAngle) + y * Math.cos(rotationAngle);
                        
                        // Proyección en perspectiva simple de los pétalos
                        let perspective = 300 / (300 + z);
                        let projX = cx + rotX * perspective;
                        let projY = cy + rotY * perspective - z * 0.3;

                        // Paleta de colores degradados rosa, magenta y loto de tu captura
                        rCtx.beginPath();
                        let distanceFactor = r / 30;
                        rCtx.fillStyle = `rgba(${220 + distanceFactor * 35}, ${50 + distanceFactor * 100}, ${120 + distanceFactor * 40}, 0.85)`;
                        
                        // Efecto luminoso en cada pétalo programado
                        rCtx.arc(projX, projY, Math.max(0.5, 1.8 * perspective), 0, Math.PI * 2);
                        rCtx.fill();
                    }
                }
                requestAnimationFrame(drawRoseFrame);
            }
            drawRoseFrame();
        }

        // Bucle global de animación de fondo
        function globalAnimate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });
            requestAnimationFrame(globalAnimate);
        }
        globalAnimate();
    </script>
</body>
</html>
