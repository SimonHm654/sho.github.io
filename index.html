<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alto Ahí - Exceso de Preciosura</title>
    <style>
        /* Fondo color crema exacto de la imagen original */
        body {
            margin: 0;
            background-color: #fceade;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Tipografía redondeada y gruesa como el cartel */
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Contenedor principal del mensaje */
        .message-container {
            position: relative;
            text-align: center;
            z-index: 10;
            padding: 20px;
            /* Hace que todo el bloque de texto flote suavemente */
            animation: floatAnimation 4s ease-in-out infinite;
        }

        /* Líneas decorativas al lado de "alto ahí" */
        .decorations {
            color: #f07b65;
            font-size: 28px;
            display: inline-block;
            margin: 0 8px;
            vertical-align: middle;
        }

        /* Estilo para las letras de color café oscuro */
        .text-dark {
            color: #4a2810;
            font-size: 46px;
            font-weight: bold;
            line-height: 1.2;
            margin: 0;
            text-transform: lowercase;
        }

        /* Estilo para las letras de color rosa/salmón */
        .text-pink {
            color: #f07b65;
            font-size: 54px;
            font-weight: bold;
            line-height: 1.1;
            margin: 8px 0 0 0;
            display: block;
            text-transform: lowercase;
        }

        /* Animación de vaivén flotante para el texto */
        @keyframes floatAnimation {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px); /* Sube un poco en el centro */
            }
            100% {
                transform: translateY(0px);
            }
        }

        /* lienzo transparente para los corazones pequeños del fondo */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="message-container">
        <p class="text-dark">
            <span class="decorations">🏃✨</span>alto ahí<span class="decorations">✨🏃</span><br>
            vienes con
        </p>
        <span class="text-pink">
            exceso de<br>
            preciosura
        </span>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const hearts = [];
        const totalHearts = 30; // Cantidad de corazones flotando de fondo

        class SpinningHeart {
            constructor() {
                this.reset();
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
            }

            reset() {
                this.size = Math.random() * 10 + 8; // Tamaño pequeño idéntico a la imagen
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + this.size + Math.random() * 100;
                this.speedY = -(Math.random() * 0.8 + 0.4); // Velocidad al subir
                this.angle = Math.random() * Math.PI * 2;
                this.spinSpeed = (Math.random() - 0.5) * 0.03; // Hace que giren sobre su eje
                this.wobble = Math.random() * Math.PI;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                // Mismo color rosa pastel de los corazones del cartel original
                this.color = `rgba(240, 123, 101, ${Math.random() * 0.3 + 0.6})`;
            }

            update() {
                this.y += this.speedY;
                this.angle += this.spinSpeed; 
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.3; // Vaivén de izquierda a derecha

                if (this.y < -this.size) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.beginPath();
                ctx.fillStyle = this.color;
                
                // Generador del trazado del corazón clásico
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, -this.size / 3, -this.size, 0);
                ctx.bezierCurveTo(-this.size, this.size / 2, -this.size / 3, this.size, 0, this.size * 1.3);
                ctx.bezierCurveTo(this.size / 3, this.size, this.size, this.size / 2, this.size, 0);
                ctx.bezierCurveTo(this.size, -this.size / 3, this.size / 2, -this.size / 2, 0, 0);
                
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < totalHearts; i++) {
            hearts.push(new SpinningHeart());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
