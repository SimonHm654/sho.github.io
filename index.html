<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alto Ahí - Exceso de Preciosura</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* Fondo color crema romántico */
        body {
            margin: 0;
            background-color: #fceade;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Fredoka', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* La carta o tarjeta romántica central */
        .love-card {
            position: relative;
            background-color: #ffffff;
            padding: 45px 50px;
            border-radius: 30px;
            /* Sombra suave y difuminada que la hace resaltar con delicadeza */
            box-shadow: 0 15px 35px rgba(240, 123, 101, 0.15);
            text-align: center;
            z-index: 10;
            max-width: 360px;
            width: 85%;
            border: 2px solid rgba(240, 123, 101, 0.1);
            /* Animación de flotación suave y romántica */
            animation: cardFloat 4s ease-in-out infinite;
        }

        /* Líneas decorativas a los lados del texto */
        .decorations {
            color: #f07b65;
            font-size: 26px;
            display: inline-block;
            margin: 0 8px;
            opacity: 0.8;
        }

        /* Estilo para las dos primeras líneas (Café chocolate oscuro) */
        .text-dark {
            color: #4a2810;
            font-size: 40px;
            font-weight: 700;
            line-height: 1.2;
            margin: 0;
        }

        /* Estilo destacado para la frase de amor (Rosa pastel encendido) */
        .text-pink {
            color: #f07b65;
            font-size: 50px;
            font-weight: 700;
            line-height: 1.1;
            margin: 12px 0 0 0;
            display: block;
        }

        /* Mini corazón decorativo estático dentro de la tarjeta */
        .card-heart {
            font-size: 24px;
            margin-top: 15px;
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Animación de flotación de la tarjeta */
        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Animación de latido para el pequeño corazón de la tarjeta */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Lienzo de fondo para los corazones que dan vueltas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

        </p>
        <span class="text-pink">
            exceso de<br>
            preciosura
        </span>
        <div class="card-heart">💝</div>
    </div>

            canvas.height = window.innerHeight;

        window.addEventListener('resize', resizeCanvas);
