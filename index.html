<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* Fondo crema romántico e infinito */
        body {
            margin: 0;
            background-color: #fceade;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Fredoka', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Contenedor de la Experiencia */
        .romantic-wrapper {
            position: relative;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 420px;
        }

        /* Recuadro central mejorado (Estilo carta de amor) */
        .poem-card {
            background-color: rgba(255, 255, 255, 0.94); /* Blanco suave nítido */
            padding: 40px 35px;
            border-radius: 32px;
            box-shadow: 0 15px 35px rgba(240, 123, 101, 0.12);
            border: 2px solid rgba(240, 123, 101, 0.15);
            width: 100%;
            box-sizing: border-box;
            min-height: 280px; /* Evita saltos bruscos de tamaño */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: cardFloat 4.5s ease-in-out infinite;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Transición de desvanecimiento entre poemas */
        .poem-card.fade {
            opacity: 0;
            transform: scale(0.97) translateY(5px);
        }

        /* Adornos estéticos de destellos */
        .decorations {
            color: #f07b65;
            font-size: 28px;
            display: inline-block;
            margin: 0 8px;
            vertical-align: middle;
        }

        /* Texto café oscuro pulido */
        .text-dark {
            color: #4a2810;
            font-size: 38px;
            font-weight: 700;
            line-height: 1.25;
            margin: 0;
        }

        /* Texto rosa salmón destacado */
        .text-pink {
            color: #f07b65;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.2;
            margin: 10px 0 0 0;
            display: block;
        }

        /* BOTÓN SOLO CON LA FLECHA */
        .arrow-btn {
            margin-top: 25px;
            background-color: #f07b65;
            color: #ffffff;
            border: none;
            width: 60px;
            height: 60px;
            font-size: 26px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(240, 123, 101, 0.3);
            transition: all 0.2s ease;
            outline: none;
            padding: 0;
        }

        /* Efectos dinámicos del botón */
        .arrow-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 24px rgba(240, 123, 101, 0.4);
            background-color: #f28b77;
        }

        .arrow-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 4px 10px rgba(240, 123, 101, 0.2);
        }

        /* Animación de flotación de la tarjeta */
        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Lienzo trasero para los corazones escarchados giratorios */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="romantic-wrapper">
        <div class="poem-card" id="poemCard">
            <p class="text-dark">
                <span class="decorations">✨</span>¡Alto ahí!<span class="decorations">✨</span><br>
                Vienes con
            </p>
            <span class="text-pink">
                exceso de<br>
                preciosura.
            </span>
        </div>

        <button class="arrow-btn" id="nextBtn" onclick="changePoem()">➔</button>
    </div>

    <script>
        // --- POEMAS CON ORTOGRAFÍA REVISADA Y CORREGIDA ---
        const poems = [
            {
                dark: "<span class='decorations'>✨</span>¡Alto ahí!<span class='decorations'>✨</span><br>Vienes con",
                pink: "exceso de<br>preciosura."
            },
            {
                dark: "En un mar de<br>estrellas,",
                pink: "mis ojos siempre<br>te buscan a ti."
            },
            {
                dark: "No es lo que<br>siento por ti,",
                pink: "es lo que no siento<br>por nadie más."
            },
            {
                dark: "Mi lugar favorito<br>en el mundo",
                pink: "es siempre a<br>tu lado."
            }
        ];

        let currentIndex = 0;
        const poemCard = document.getElementById('poemCard');

        function changePoem() {
            poemCard.classList.add('fade');

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % poems.length;
                
                poemCard.innerHTML = `
                    <p class="text-dark">${poems[currentIndex].dark}</p>
                    <span class="text-pink">${poems[currentIndex].pink}</span>
                `;
                
                poemCard.classList.remove('fade');
            }, 300);
        }


        // --- EFECTO DE CORAZONES FLOTANTES, GIRATORIOS Y ESCARCHADOS ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const hearts = [];
        const totalHearts = 35; 

        class SparklingHeart {
            constructor() {
                this.reset();
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
            }

            reset() {
                this.size = Math.random() * 10 + 8;
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + this.size + Math.random() * 100;
                this.speedY = -(Math.random() * 0.5 + 0.35); // Velocidad al flotar hacia arriba
                this.angle = Math.random() * Math.PI * 2; // Ángulo inicial
                this.spinSpeed = (Math.random() * 0.02 + 0.01) * (Math.random() < 0.5 ? 1 : -1); // Hace que giren constantemente
                this.wobble = Math.random() * Math.PI;
                this.wobbleSpeed = Math.random() * 0.015 + 0.01;
                
                // Color base rosa salmón romántico
                this.baseColor = { r: 240, g: 123, b: 101 };
                this.alpha = Math.random() * 0.35 + 0.6;
                // Brillo de escarcha individual
                this.sparkleSize = Math.random() * 10 + 10;
            }

            update() {
                this.y += this.speedY;
                this.angle += this.spinSpeed; // Giro continuo sobre su eje
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.25; // Vaivén de balanceo

                if (this.y < -this.size) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle); // Aplica el giro físico en pantalla

                // CONFIGURACIÓN DEL EFECTO ESCARCHADO (Brillo luminoso en los bordes)
                ctx.shadowBlur = this.sparkleSize;
                ctx.shadowColor = `rgba(255, 190, 180, ${this.alpha})`;
                
                ctx.beginPath();
                // Creamos un degradado interno para simular destellos de purpurina
                let gradient = ctx.createRadialGradient(0, 0, 1, 0, 0, this.size);
                gradient.addColorStop(0, `rgba(255, 210, 200, ${this.alpha})`); // Centro brillante
                gradient.addColorStop(0.8, `rgba(${this.baseColor.r}, ${this.baseColor.g}, ${this.baseColor.b}, ${this.alpha})`);
                ctx.fillStyle = gradient;
                
                // Geometría clásica del corazón
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, -this.size / 3, -this.size, 0);
                ctx.bezierCurveTo(-this.size, this.size / 2, -this.size / 3, this.size, 0, this.size * 1.35);
                ctx.bezierCurveTo(this.size / 3, this.size, this.size, this.size / 2, this.size, 0);
                ctx.bezierCurveTo(this.size, -this.size / 3, this.size / 2, -this.size / 2, 0, 0);
                
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < totalHearts; i++) {
            hearts.push(new SparklingHeart());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
