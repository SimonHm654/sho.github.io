<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Carta de Amor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

overflow:hidden;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:Georgia,serif;

background:

radial-gradient(circle at top,#ff7aa2,#8a2be2,#0d1026);

}

/* partículas */

.particles{

position:absolute;

width:100%;
height:100%;

overflow:hidden;

}

.heart{

position:absolute;

font-size:18px;

animation:
rise linear infinite;

opacity:.6;

}

@keyframes rise{

from{

transform:
translateY(110vh);

opacity:0;

}

20%{

opacity:1;

}

to{

transform:
translateY(-20vh);

opacity:0;

}

}

/* brillo */

.glow{

position:absolute;

width:900px;

height:900px;

border-radius:50%;

background:

radial-gradient(
circle,
rgba(255,255,255,.18),
transparent 70%
);

animation:
pulse 8s infinite;

}

@keyframes pulse{

50%{

transform:scale(1.2);

}

}

/* escena */

.scene{

position:relative;

width:650px;

height:650px;

display:flex;
justify-content:center;
align-items:center;

}

/* sobre */

.envelope{

position:absolute;

bottom:100px;

width:360px;

height:240px;

background:

linear-gradient(
145deg,
#e7b26d,
#c88a42
);

box-shadow:
0 25px 60px rgba(0,0,0,.4);

border-radius:6px;

overflow:hidden;

}

/* tapa */

.flap{

position:absolute;

width:100%;

height:100%;

background:

linear-gradient(
145deg,
#f1c27d,
#d59a58
);

clip-path:
polygon(
0 0,
100% 0,
50% 65%
);

transform-origin:top;

animation:

open 2s forwards;

animation-delay:1s;

z-index:5;

}

@keyframes open{

to{

transform:
rotateX(180deg);

}

}

/* carta */

.paper{

position:absolute;

width:440px;

height:520px;

background:

linear-gradient(
180deg,
#fffdf9,
#fff6ec
);

border-radius:12px;

padding:45px;

box-shadow:
0 20px 80px rgba(0,0,0,.35);

transform:

translateY(250px)
scale(.7);

animation:

pull 3s forwards;

animation-delay:2s;

z-index:2;

overflow:hidden;

}

@keyframes pull{

to{

transform:

translateY(-30px)
scale(1);

}

}

/* decoración carta */

.paper:before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:12px;

background:

linear-gradient(
90deg,
#ff7aa2,
#ffb6c1,
#ff7aa2
);

}

/* poema */

.content{

opacity:0;

animation:

show 2s forwards;

animation-delay:4s;

text-align:center;

height:100%;

display:flex;

flex-direction:column;

justify-content:center;

}

@keyframes show{

to{

opacity:1;

}

}

h1{

font-size:42px;

color:#d23b67;

margin-bottom:25px;

}

.text{

font-size:22px;

line-height:1.8;

color:#555;

}

.signature{

margin-top:35px;

font-style:italic;

color:#b34d70;

font-size:20px;

}

</style>

</head>

<body>

<div class="particles" id="particles"></div>

<div class="glow"></div>

<div class="scene">

<div class="paper">

<div class="content">

<h1>❤️ Para Ti ❤️</h1>

<div class="text">

A veces el amor no llega<br>
haciendo ruido.<br><br>

Llega silenciosamente,<br>
como una carta olvidada,<br>
esperando el momento correcto<br>
para abrirse.<br><br>

Y si hoy estás aquí,<br>
quizá era porque<br>
estas palabras<br>
siempre estuvieron destinadas<br>
a encontrarte.

</div>

<div class="signature">

Con amor infinito ✨

</div>

</div>

</div>

<div class="envelope">

<div class="flap"></div>

</div>

</div>

<script>

const container=
document.getElementById(
"particles"
);

for(let i=0;i<70;i++){

let h=
document.createElement(
"div"
);

h.className="heart";

h.innerHTML="❤";

h.style.left=
Math.random()*100+"%";

h.style.fontSize=
(12+Math.random()*25)+"px";

h.style.animationDuration=
(8+Math.random()*10)+"s";

h.style.animationDelay=
Math.random()*10+"s";

container.appendChild(h);

}

</script>

</body>
</html>
