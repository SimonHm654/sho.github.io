<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alto Ahí - Exceso de Preciosura</title>
    <style>
        /* Fondo color crema exacto de la imagen original */
        body {
            margin: 0;
            background-color: #fceade;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Contenedor del texto original recortado */
        .text-image-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            z-index: 10;
            /* Hace que el texto flote suavemente en el centro */
            animation: floatAnimation 4s ease-in-out infinite;
        }

        /* La imagen del texto original limpia y transparente sin el perro */
        .text-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Animación de flotación suave */
        @keyframes floatAnimation {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px); /* Sube un poco */
            }
            100% {
                transform: translateY(0px);
            }
        }

        /* Lienzo transparente para los corazones pequeños giratorios */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="text-image-container">
        <img src="https://i.ibb.co/C31rKWhN/texto-solo.png" alt="Alto ahí vienes con exceso de preciosura">
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const hearts = [];
        const totalHearts = 25; // Cantidad de corazoncitos que dan vueltas

        class SpinningHeart {
            constructor() {
                this.reset();
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
            }

            reset() {
                this.size = Math.random() * 10 + 8; // Tamaños pequeños
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + this.size + Math.random() * 100;
                this.speedY = -(Math.random() * 0.7 + 0.4); // Velocidad de subida suave
                this.angle = Math.random() * Math.PI * 2;
                this.spinSpeed = (Math.random() - 0.5) * 0.03; // Velocidad de giro
                this.wobble = Math.random() * Math.PI;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                // Color rosa exacto de los corazones de la imagen
                this.color = `rgba(243, 137, 137, ${Math.random() * 0.4 + 0.6})`;
            }

            update() {
                this.y += this.speedY;
                this.angle += this.spinSpeed; // Hace que giren sobre su propio eje
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.3; // Movimiento ondulado horizontal

                if (this.y < -this.size) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.beginPath();
                ctx.fillStyle = this.color;
                
                // Vector del corazón perfecto
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, -this.size / 3, -this.size, 0);
                ctx.bezierCurveTo(-this.size, this.size / 2, -this.size / 3, this.size, 0, this.size * 1.3);
                ctx.bezierCurveTo(this.size / 3, this.size, this.size, this.size / 2, this.size, 0);
                ctx.bezierCurveTo(this.size, -this.size / 3, this.size / 2, -this.size / 2, 0, 0);
                
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < totalHearts; i++) {
            hearts.push(new SpinningHeart());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
