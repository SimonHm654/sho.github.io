<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* Fondo crema cálido y romántico original */
        body {
            margin: 0;
            background-color: #fceade;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Fredoka', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Contenedor principal interactivo */
        .romantic-wrapper {
            position: relative;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 500px;
            height: 350px; /* Espacio reservado para que al cambiar de poema no se mueva el botón */
        }

        /* Contenedor del poema actual con animación de flotación */
        .poem-box {
            animation: floatAnimation 4s ease-in-out infinite;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 1;
            transform: scale(1);
        }

        /* Clase auxiliar para el efecto de desvanecimiento al cambiar de texto */
        .poem-box.fade {
            opacity: 0;
            transform: scale(0.95);
        }

        /* Estilos decorativos */
        .decorations {
            color: #f07b65;
            font-size: 32px;
            display: inline-block;
            margin: 0 10px;
            vertical-align: middle;
        }

        /* Líneas en café oscuro texturizado */
        .text-dark {
            color: #4a2810;
            font-size: 44px;
            font-weight: 700;
            line-height: 1.2;
            margin: 0;
            /* Sombra suave para que resalte hermoso sobre los corazones */
            text-shadow: 2px 2px 4px rgba(74, 40, 16, 0.05);
        }

        /* Líneas en rosa salmón encendido */
        .text-pink {
            color: #f07b65;
            font-size: 56px;
            font-weight: 700;
            line-height: 1.15;
            margin: 8px 0 0 0;
            display: block;
            text-shadow: 2px 2px 4px rgba(240, 123, 101, 0.1);
        }

        /* El botón mágico para el siguiente poema */
        .next-btn {
            margin-top: 40px;
            background-color: #f07b65;
            color: #ffffff;
            border: none;
            padding: 14px 32px;
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 8px 20px rgba(240, 123, 101, 0.35);
            transition: all 0.2s ease;
            outline: none;
        }

        /* Efecto al pasar el cursor o pulsar el botón */
        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(240, 123, 101, 0.45);
            background-color: #f28b77;
        }

        .next-btn:active {
            transform: translateY(1px);
            box-shadow: 0 4px 10px rgba(240, 123, 101, 0.3);
        }

        /* Animación de flotación romántica del texto */
        @keyframes floatAnimation {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* Canvas infinito para tus corazones giratorios */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="romantic-wrapper">
        <div class="poem-box" id="poemBox">
            <p class="text-dark">
                <span class="decorations">✨</span>alto ahí<span class="decorations">✨</span><br>
                vienes con
            </p>
            <span class="text-pink">
                exceso de<br>
                preciosura
            </span>
        </div>

        <button class="next-btn" id="nextBtn" onclick="changePoem()">Siguiente poema 💝</button>
    </div>

    <script>
        // --- SISTEMA DE CAMBIO DE POEMAS INTERACTIVOS ---
        // Puedes cambiar, borrar o añadir los poemas que tú quieras aquí adentro:
        const poems = [
            {
                dark: "<span class='decorations'>✨</span>alto ahí<span class='decorations'>✨</span><br>vienes con",
                pink: "exceso de<br>preciosura"
            },
            {
                dark: "en un mar de<br>estrellas,",
                pink: "mis ojos siempre<br>te buscan a ti"
            },
            {
                dark: "no es lo que<br>siento por ti,",
                pink: "es lo que no siento<br>por nadie más"
            },
            {
                dark: "mi lugar favorito<br>en el mundo",
                pink: "es siempre a<br>tu lado"
            }
        ];

        let currentIndex = 0;
        const poemBox = document.getElementById('poemBox');

        function changePoem() {
            // Aplicamos animación de desvanecimiento
            poemBox.classList.add('fade');

            setTimeout(() => {
                // Avanzamos al siguiente poema (vuelve al inicio si llega al final)
                currentIndex = (currentIndex + 1) % poems.length;
                
                // Actualizamos el contenido
                poemBox.innerHTML = `
                    <p class="text-dark">${poems[currentIndex].dark}</p>
                    <span class="text-pink">${poems[currentIndex].pink}</span>
                `;
                
                // Quitamos el desvanecimiento para que aparezca el nuevo poema de forma suave
                poemBox.classList.remove('fade');
            }, 400); // Sincronizado con la transición CSS
        }


        // --- SISTEMA DE CORAZONES GIRATORIOS DE FONDO ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const hearts = [];
        const totalHearts = 35; // Densidad perfecta de corazones flotando

        class SpinningHeart {
            constructor() {
                this.reset();
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
            }

            reset() {
                this.size = Math.random() * 11 + 9;
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + this.size + Math.random() * 100;
                this.speedY = -(Math.random() * 0.55 + 0.35); // Velocidad suave
                this.angle = Math.random() * Math.PI * 2;
                this.spinSpeed = (Math.random() - 0.5) * 0.025; // Control del giro sobre su eje
                this.wobble = Math.random() * Math.PI;
                this.wobbleSpeed = Math.random() * 0.015 + 0.01;
                // Color rosa dulce translúcido idéntico al original
                this.color = `rgba(240, 123, 101, ${Math.random() * 0.35 + 0.55})`;
            }

            update() {
                this.y += this.speedY;
                this.angle += this.spinSpeed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.25;

                if (this.y < -this.size) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.beginPath();
                ctx.fillStyle = this.color;
                
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, -this.size / 3, -this.size, 0);
                ctx.bezierCurveTo(-this.size, this.size / 2, -this.size / 3, this.size, 0, this.size * 1.35);
                ctx.bezierCurveTo(this.size / 3, this.size, this.size, this.size / 2, this.size, 0);
                ctx.bezierCurveTo(this.size, -this.size / 3, this.size / 2, -this.size / 2, 0, 0);
                
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < totalHearts; i++) {
            hearts.push(new SpinningHeart());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
